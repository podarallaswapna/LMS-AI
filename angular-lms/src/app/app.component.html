<header class="app-shell">
  <nav class="navbar navbar-expand-lg shell-nav">
    <div class="container">
      <a class="navbar-brand brand-mark" routerLink="/">LMS-AI</a>
      <button class="navbar-toggler nav-toggle" type="button" (click)="toggleNav()" [attr.aria-expanded]="isNavOpen" aria-controls="navbarNav" aria-label="Toggle navigation">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="navbar-collapse" id="navbarNav" [class.show]="isNavOpen">
        <ul class="navbar-nav ms-auto align-items-lg-center">
          <li class="nav-item">
            <a class="nav-link" routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }" (click)="closeMenus()">Home</a>
          </li>
          <li class="nav-item dropdown course-menu" [class.show]="isCoursesMenuOpen">
            <button class="nav-link dropdown-toggle nav-dropdown-btn" type="button" (click)="toggleCoursesMenu()" [attr.aria-expanded]="isCoursesMenuOpen">
              All Courses
            </button>
            <div class="dropdown-menu course-dropdown" [class.show]="isCoursesMenuOpen">
              <div class="submenu-group" *ngFor="let menu of courseMenus" [class.open]="activeSubmenu === menu.id">
                <div class="submenu-header">
                  <a
                    class="dropdown-item submenu-link"
                    routerLink="/courses"
                    [queryParams]="{ category: menu.label }"
                    (click)="closeMenus()"
                  >
                    <span>{{ menu.label }}</span>
                    <small>{{ menu.description }}</small>
                  </a>
                  <button class="submenu-toggle" type="button" (click)="toggleSubmenu(menu.id)">
                    +
                  </button>
                </div>
                <div class="dropdown-menu nested-menu" [class.show]="activeSubmenu === menu.id">
                  <a
                    class="dropdown-item nested-link"
                    *ngFor="let child of menu.children"
                    routerLink="/courses"
                    [queryParams]="{ category: menu.label, course: child.label }"
                    (click)="closeMenus()"
                  >
                    {{ child.label }}
                  </a>
                </div>
              </div>
            </div>
          </li>
          <li class="nav-item">
            <a class="nav-link" routerLink="/registration" routerLinkActive="active" (click)="closeMenus()">Registration</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" routerLink="/gallery" routerLinkActive="active" (click)="closeMenus()">Gallery</a>
          </li>
          <li class="nav-item" *ngIf="isSignedIn">
            <a class="nav-link" routerLink="/dashboard" routerLinkActive="active" (click)="closeMenus()">Dashboard</a>
          </li>
          <li class="nav-item" *ngIf="!isSignedIn">
            <a class="nav-link" routerLink="/sign-up" routerLinkActive="active" (click)="closeMenus()">Sign Up</a>
          </li>
          <li class="nav-item" *ngIf="!isSignedIn">
            <a class="nav-link" routerLink="/sign-in" routerLinkActive="active" (click)="closeMenus()">Sign In</a>
          </li>
          <li class="nav-item" *ngIf="isSignedIn">
            <a class="nav-link" href="#" (click)="signOut(); closeMenus()">Sign Out</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" routerLink="/contact" routerLinkActive="active" (click)="closeMenus()">Contact Us</a>
          </li>
        </ul>
      </div>
    </div>
  </nav>
</header>

<main class="container page-shell">
  <router-outlet></router-outlet>
</main>
