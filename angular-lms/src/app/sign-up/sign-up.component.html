<section class="sign-up-form">
  <h2>Sign Up</h2>
  <form [formGroup]="signUpForm" (ngSubmit)="onSubmit()" novalidate>
    <div class="form-group mb-3">
      <label for="name">Name</label>
      <input id="name" type="text" class="form-control" formControlName="name">
      <div class="text-danger" *ngIf="submitted && signUpForm.get('name')?.errors">
        <small *ngIf="signUpForm.get('name')?.errors?.['required']">Name is required.</small>
        <small *ngIf="signUpForm.get('name')?.errors?.['minlength']">Name must be at least 2 characters.</small>
      </div>
    </div>
    <div class="form-group mb-3">
      <label for="email">Email</label>
      <input id="email" type="email" class="form-control" formControlName="email">
      <div class="text-danger" *ngIf="submitted && signUpForm.get('email')?.errors">
        <small *ngIf="signUpForm.get('email')?.errors?.['required']">Email is required.</small>
        <small *ngIf="signUpForm.get('email')?.errors?.['email']">Invalid email address.</small>
      </div>
    </div>
    <div class="form-group mb-3">
      <label for="password">Password</label>
      <input id="password" type="password" class="form-control" formControlName="password">
      <div class="text-danger" *ngIf="submitted && signUpForm.get('password')?.errors">
        <small *ngIf="signUpForm.get('password')?.errors?.['required']">Password is required.</small>
        <small *ngIf="signUpForm.get('password')?.errors?.['minlength']">Password must be at least 6 characters.</small>
      </div>
    </div>
    <div class="form-group mb-3">
      <label for="confirmPassword">Confirm Password</label>
      <input id="confirmPassword" type="password" class="form-control" formControlName="confirmPassword">
      <div class="text-danger" *ngIf="submitted && signUpForm.errors?.['mismatch']">
        <small>Passwords do not match.</small>
      </div>
    </div>
    <button type="submit" class="btn btn-primary">Sign Up</button>
    <div class="alert alert-success mt-3" *ngIf="successMessage">{{ successMessage }}</div>
    <div class="alert alert-danger mt-3" *ngIf="errorMessage">{{ errorMessage }}</div>
  </form>
</section>
